<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mortgage Calculator</title>

<style>
html, body {
    min-height: 100% !important;
    height: auto !important;
    overflow-x: hidden !important;
    overflow-y: visible !important;
}

body {
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    background: #eef3f7;
    color: #111827;
    overflow-x: hidden !important;
    overflow-y: visible !important;
}

.container {
    max-width: 1100px;
    margin: 0 auto 24px;
    padding: 16px;
    overflow: visible !important;
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
}

.card {
    position: relative;
    width: 100%;
    background: #ffffff;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    padding: 0 32px 32px;
    overflow: visible !important;
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
}

.inputs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid #e5e7eb;
}

.input-group {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #475569;
    margin-bottom: 8px;
}

input {
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    color: #0f172a;
    outline: none;
    transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
}

input:hover {
    background: #f5f7fb;
}

input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    background: #ffffff;
}

/* remove spinners */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
}

button {
    margin-top: 10px;
    padding: 12px 18px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: #2563eb;
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
}

button:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
}

button:focus-visible {
    outline: 2px solid rgba(37, 99, 235, 0.4);
    outline-offset: 3px;
}

.input-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    min-width: 0;
}

.input-row input {
    flex: 1;
    min-width: 0;
}

.tax-group .input-row button {
    margin-top: 0;
    flex: 0 0 auto;
    white-space: nowrap;
}

.table-wrapper {
    display: block !important;
    width: 100% !important;
    border-radius: 14px;
    background: #ffffff;
    overflow: visible !important;
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
}

.table-wrapper::-webkit-scrollbar {
    width: 0;
    height: 0;
}

table {
    width: 100%;
    margin-top: 0;
    border-collapse: collapse;
    border-spacing: 0;
    font-size: 13px;
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
    overflow: visible !important;
}

thead tr {
    /* keep default table flow for row grouping */
}

/* force natural content growth for card and table wrapper */
html,
body,
.container,
.card,
.table-wrapper,
table,
tbody,
thead,
tfoot,
tr,
th,
td {
    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;
    overflow: visible !important;
}

thead th {
    position: sticky;
    top: 96px;
    z-index: 12;
    background: #f8fafc;
    background-clip: padding-box;
    border-bottom: 1px solid #e5e7eb;
    box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.04);
}

th, td {
    padding: 14px 16px;
    text-align: right;
    border-bottom: 1px solid #e2e8f0;
}

th {
    background: #f8fafc;
    color: #334155;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
}

tbody tr:hover {
    background: rgba(37, 99, 235, 0.04);
}

@media (max-width: 760px) {
    table {
        font-size: 13px;
    }
    th, td {
        padding: 10px 12px;
        text-align: left;
    }
    .year-row td {
        white-space: normal;
    }
}

.toggle-icon {
    display: inline-block;
    width: 18px;
    text-align: center;
    margin-right: 6px;
    color: #2563eb;
}

.downpayment-row input {
    width: 140px;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 13px;
}

tfoot tr {
    background: #f3f4f6;
    font-weight: 700;
}

.year-row {
    background: #eef2ff;
    cursor: pointer;
    font-weight: bold;
}

.month-row {
    display: none;
}

.tax { color: #0f766e; font-weight: 600; }
.net { color: #92400e; font-weight: 600; }
.equity { color: #1d4ed8; font-weight: 600; }

</style>

</head>
<body>

<div class="container">
<div style="display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:16px; position:fixed; top:0; left:0; right:0; background:#ffffff; padding:0 28px 10px; border-bottom:1px solid rgba(15, 23, 42, 0.08); box-shadow:0 4px 12px rgba(15, 23, 42, 0.06); z-index:100; min-height:84px;">
    <div style="display:flex; flex-direction:column; justify-content:center;">
        <p style="margin:0;font-size:12px;font-weight:700;color:#475569;letter-spacing:0.08em;text-transform:uppercase;">Loan analysis</p>
        <h2 style="margin:4px 0 0;font-size:28px;color:#0f172a;line-height:1.05;">Mortgage Calculator</h2>
    </div>
    <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; align-items:flex-end; min-width:0;">
        <div style="flex:0 1 140px;">
            <label style="display:block; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Loan (€)</label>
            <input type="text" inputmode="numeric" id="loan" value="600.000" style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; background:#f8fafc; font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:13px; color:#0f172a;">
        </div>
        <div style="flex:0 1 120px;">
            <label style="display:block; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Interest (%)</label>
            <input type="number" id="rate" value="4.17" step="0.01" style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; background:#f8fafc; font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:13px; color:#0f172a;">
        </div>
        <div style="flex:0 1 100px;">
            <label style="display:block; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Years</label>
            <input type="number" id="years" value="30" max="100" style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; background:#f8fafc; font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:13px; color:#0f172a;">
        </div>
        <div style="flex:0 1 130px;">
            <label style="display:block; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Tax return (%)</label>
            <input type="number" id="taxRate" value="36.97" step="0.01" style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; background:#f8fafc; font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:13px; color:#0f172a;">
        </div>
    </div>
    <div style="display:flex; justify-content:flex-end; align-items:flex-start;">
        <button id="toggleAll" type="button" style="margin-top:0; height:38px;">Expand All</button>
    </div>
</div>

<div style="height:96px;"></div>

<div class="card">
        <table>
            <thead>
            <tr>
                <th>Period</th>
                <th>Payment</th>
                <th>Interest</th>
                <th>Principal</th>
                <th>Tax Return</th>
                <th>Net</th>
                <th>Equity</th>
                <th>Remaining Principal</th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
            <tr>
                <th>Total</th>
                <td id="totalPayment"></td>
                <td id="totalInterest"></td>
                <td id="totalPrincipal"></td>
                <td id="totalTax"></td>
                <td id="totalNet"></td>
                <td id="totalEquity"></td>
                <td id="totalBalance"></td>
            </tr>
            </tfoot>
        </table>

</div>
</div>

<script>

function formatNumber(num, decimals = 2) {
    const fixed = num.toFixed(decimals);
    const parts = fixed.split('.');
    const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    const decPart = parts[1] || '';
    
    // Don't show comma if no decimals requested or all decimals are 0
    if (!decPart || decPart === '0'.repeat(decimals)) {
        return intPart;
    }
    return intPart + ',' + decPart;
}

// Helper function to calculate remaining interest from a given balance
function calculateRemainingInterest(balance, monthlyPayment, monthlyRate, monthsRemaining) {
    let tempBalance = balance;
    let totalInterest = 0;
    for (let m = 0; m < monthsRemaining; m++) {
        if (tempBalance <= 0) break;
        let interest = tempBalance * monthlyRate;
        let principal = monthlyPayment - interest;
        tempBalance -= principal;
        totalInterest += interest;
    }
    return totalInterest;
}

// Calculate and display interest savings for each extra payment
function calculateInterestSavings(initialLoan, monthlyRate, monthlyPayment) {
    let balance = initialLoan;
    
    // Simulate through the loan to match up with the table
    for (let y = 1; y <= 100; y++) {
        let yearId = "y" + y;
        
        for (let m = 1; m <= 12; m++) {
            if (balance <= 0) break;
            let interest = balance * monthlyRate;
            let principal = monthlyPayment - interest;
            balance -= principal;
        }
        
        // Calculate interest savings for this year's extra payment
        const savingsElement = document.getElementById("savings" + yearId);
        if (savingsElement && balance > 0) {
            const extraPaymentAmount = annualDownPayments[yearId] || 0;
            if (extraPaymentAmount > 0) {
                // Calculate interest that would be saved
                const monthsRemaining = Math.ceil(balance / monthlyPayment) + 120; // Add buffer
                const interestWithoutExtra = calculateRemainingInterest(balance, monthlyPayment, monthlyRate, monthsRemaining);
                const interestWithExtra = calculateRemainingInterest(Math.max(0, balance - extraPaymentAmount), monthlyPayment, monthlyRate, monthsRemaining);
                const interestSaved = interestWithoutExtra - interestWithExtra;
                
                if (interestSaved > 0) {
                    savingsElement.innerText = `Saved Interest: ${formatNumber(interestSaved, 0)}`;
                } else {
                    savingsElement.innerText = '';
                }
            } else {
                savingsElement.innerText = '';
            }
        }
        
        if (balance <= 0) break;
    }
}

let allYearsExpanded = false;
let yearOpenStates = {};
let annualDownPayments = {};

function calculate() {
    const activeElement = document.activeElement;
    const focusedYear = activeElement instanceof HTMLInputElement && activeElement.classList.contains('downpayment-input')
        ? activeElement.dataset.year
        : null;
    const focusedValue = activeElement instanceof HTMLInputElement && activeElement.classList.contains('downpayment-input')
        ? activeElement.value
        : null;
    const selectionStart = activeElement instanceof HTMLInputElement ? activeElement.selectionStart : null;
    const selectionEnd = activeElement instanceof HTMLInputElement ? activeElement.selectionEnd : null;

    let loan = +(document.getElementById("loan").value.replace(/\D/g, ''));
    let rate = (+document.getElementById("rate").value) / 100 / 12;
    let years = +document.getElementById("years").value;
    let taxRate = (+document.getElementById("taxRate").value) / 100;

    if (!loan || years <= 0) {
        document.getElementById("tbody").innerHTML = "";
        updateTotals(0,0,0,0,0,0,0);
        return;
    }

    let n = years * 12;
    let payment = rate === 0 ? loan / n : loan * rate / (1 - Math.pow(1 + rate, -n));

    let balance = loan;
    let totalPayment = 0;
    let totalInterest = 0;
    let totalPrincipal = 0;
    let totalTax = 0;
    let totalNet = 0;
    let totalEquity = 0;

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    for (let y = 1; y <= years; y++) {
        let yearInterest = 0, yearPrincipal = 0, yearTax = 0, yearNet = 0, yearPayment = 0, yearEquity = 0;
        let yearId = "y" + y;

        let isOpen = allYearsExpanded || yearOpenStates[yearId] === true;
        let header = document.createElement("tr");
        header.className = "year-row";
        header.dataset.open = isOpen ? "1" : "0";
        header.dataset.year = yearId;

        header.innerHTML = `
            <td><span class="toggle-icon">${isOpen ? '▾' : '▸'}</span>Year ${y}</td>
            <td id="pay${y}">${formatNumber(payment * 12, 0)}</td>
            <td id="i${y}"></td>
            <td id="p${y}"></td>
            <td id="t${y}" class="tax"></td>
            <td id="n${y}" class="net"></td>
            <td id="e${y}" class="equity"></td>
            <td id="b${y}"></td>
        `;

        header.onclick = () => {
            let open = header.dataset.open === "1";
            setYearOpen(header, !open);
        };

        tbody.appendChild(header);

        for (let m = 1; m <= 12; m++) {
            if (balance <= 0) {
                break;
            }

            let interest = balance * rate;
            let principal = payment - interest;
            let paymentAmount = payment;
            if (principal > balance) {
                principal = balance;
                paymentAmount = interest + principal;
            }
            balance -= principal;

            let tax = interest * taxRate;
            let net = paymentAmount - tax;

            yearInterest += interest;
            yearPrincipal += principal;
            yearTax += tax;
            yearNet += net;
            yearPayment += paymentAmount;
            yearEquity += principal;

            totalPayment += paymentAmount;
            totalInterest += interest;
            totalPrincipal += principal;
            totalTax += tax;
            totalNet += net;
            totalEquity += principal;

            let row = document.createElement("tr");
            row.className = "month-row " + yearId;
            row.style.display = isOpen ? "table-row" : "none";

            row.innerHTML = `
                <td>Month ${(y - 1) * 12 + m}</td>
                <td>${formatNumber(paymentAmount, 2)}</td>
                <td>${formatNumber(interest, 2)}</td>
                <td>${formatNumber(principal, 2)}</td>
                <td class="tax">${formatNumber(tax, 2)}</td>
                <td class="net">${formatNumber(net, 2)}</td>
                <td class="equity">${formatNumber(loan - balance, 2)}</td>
                <td>${formatNumber(balance, 2)}</td>
            `;

            tbody.appendChild(row);

                if (balance <= 0) {
                break;
            }
        }

        if (balance > 0) {
            let extraPayment = Math.max(0, annualDownPayments[yearId] || 0);
            if (extraPayment > 0) {
                extraPayment = Math.min(extraPayment, balance);
                balance -= extraPayment;
                yearPayment += extraPayment;
                yearPrincipal += extraPayment;
                yearEquity += extraPayment;
                totalPayment += extraPayment;
                totalPrincipal += extraPayment;
                totalEquity += extraPayment;
            }

            let extraRow = document.createElement("tr");
            extraRow.className = "month-row downpayment-row " + yearId;
            extraRow.style.display = isOpen ? "table-row" : "none";
            extraRow.innerHTML = `
                <td colspan="2">Extra Repayment End Of Year ${y}:</td>
                <td colspan="2"><input type="text" inputmode="numeric" pattern="[0-9]*" data-year="${yearId}" class="downpayment-input" value="${extraPayment > 0 ? formatNumber(Math.round(extraPayment), 0) : ''}" style="text-align:right;"></td>
                <td colspan="1" style="padding-left:8px; white-space:nowrap; color:#6b7280;">€</td>
                <td colspan="3" id="savings${yearId}" style="color: #059669; font-weight: 600; text-align:left; padding-left:8px;"></td>
            `;
            tbody.appendChild(extraRow);

            const extraInput = extraRow.querySelector('input');
            let pendingCalculateFrame = null;
            extraInput.addEventListener('focus', event => {
                if (event.target.value === '0') {
                    event.target.value = '';
                }
            });
            extraInput.addEventListener('blur', event => {
                if (event.target.value === '') {
                    annualDownPayments[yearId] = 0;
                }
            });
            extraInput.addEventListener('input', event => {
                // Track cursor position in terms of digit count (not string position)
                const cursorPos = event.target.selectionStart;
                const oldValue = event.target.value;
                let digitsBefore = 0;
                for (let i = 0; i < cursorPos && i < oldValue.length; i++) {
                    if (/\d/.test(oldValue[i])) digitsBefore++;
                }
                
                // Extract raw digits and format
                const rawValue = event.target.value.replace(/\D/g, '');
                const formatted = formatNumber(parseInt(rawValue || 0, 10), 0);
                event.target.value = formatted;
                
                // Restore cursor position intelligently
                let newCursorPos = 0;
                let digitsFound = 0;
                for (let i = 0; i < formatted.length; i++) {
                    if (/\d/.test(formatted[i])) {
                        digitsFound++;
                        if (digitsFound === digitsBefore) {
                            newCursorPos = i + 1;
                            break;
                        }
                    }
                }
                if (newCursorPos === 0) newCursorPos = formatted.length;
                event.target.setSelectionRange(newCursorPos, newCursorPos);
                
                annualDownPayments[yearId] = rawValue ? parseInt(rawValue, 10) : 0;
                if (pendingCalculateFrame !== null) {
                    cancelAnimationFrame(pendingCalculateFrame);
                }
                pendingCalculateFrame = requestAnimationFrame(() => {
                    pendingCalculateFrame = null;
                    calculate();
                });
            });
            if (focusedYear === yearId && focusedValue !== null) {
                const rawVal = focusedValue.replace(/\D/g, '');
                extraInput.value = formatNumber(parseInt(rawVal, 10), 0);
                window.requestAnimationFrame(() => {
                    extraInput.focus();
                    if (selectionStart !== null && selectionEnd !== null) {
                        extraInput.setSelectionRange(selectionStart, selectionEnd);
                    }
                });
            }
        }

        document.getElementById("i" + y).innerText = formatNumber(yearInterest, 0);
        document.getElementById("p" + y).innerText = formatNumber(yearPrincipal, 0);
        document.getElementById("t" + y).innerText = formatNumber(yearTax, 0);
        document.getElementById("n" + y).innerText = formatNumber(yearNet, 0);
        document.getElementById("e" + y).innerText = formatNumber(yearEquity, 0);
        document.getElementById("b" + y).innerText = formatNumber(Math.max(0, balance), 0);
        document.getElementById("pay" + y).innerText = formatNumber(yearPayment, 0);

        if (balance <= 0) {
            balance = 0;
            break;
        }
    }

    updateTotals(totalPayment, totalInterest, totalPrincipal, totalTax, totalNet, totalEquity, balance);
    
    // Calculate and display interest savings for each extra payment
    calculateInterestSavings(loan, rate, payment);
}

function updateTotals(payment, interest, principal, tax, net, equity, balance) {
    document.getElementById('totalPayment').innerText = formatNumber(payment, 2);
    document.getElementById('totalInterest').innerText = formatNumber(interest, 2);
    document.getElementById('totalPrincipal').innerText = formatNumber(principal, 2);
    document.getElementById('totalTax').innerText = formatNumber(tax, 2);
    document.getElementById('totalNet').innerText = formatNumber(net, 2);
    // Show total equity as the original loan amount (not the sum of yearly equity)
    const loanVal = +(document.getElementById('loan').value.replace(/\D/g, '')) || 0;
    document.getElementById('totalEquity').innerText = formatNumber(loanVal, 2);
    document.getElementById('totalBalance').innerText = formatNumber(balance, 2);
}

function setYearOpen(header, open) {
    header.dataset.open = open ? "1" : "0";
    const icon = header.querySelector(".toggle-icon");
    if (icon) {
        icon.textContent = open ? '▾' : '▸';
    }
    const yearId = header.dataset.year;
    yearOpenStates[yearId] = open;
    if (!open) {
        allYearsExpanded = false;
        document.getElementById('toggleAll').textContent = 'Expand All';
    }
    document.querySelectorAll("tr.month-row." + yearId).forEach(r => {
        r.style.display = open ? "table-row" : "none";
    });
}

function toggleAllYears() {
    allYearsExpanded = !allYearsExpanded;
    document.querySelectorAll('.year-row').forEach(header => {
        setYearOpen(header, allYearsExpanded);
    });
    document.querySelectorAll('.year-row').forEach(header => {
        yearOpenStates[header.dataset.year] = allYearsExpanded;
    });
    document.getElementById('toggleAll').textContent = allYearsExpanded ? 'Collapse All' : 'Expand All';
}

window.addEventListener('DOMContentLoaded', () => {
    const loanInput = document.getElementById('loan');
    
    // Format loan input with European notation
    loanInput.addEventListener('input', event => {
        const cursorPos = event.target.selectionStart;
        const oldValue = event.target.value;
        let digitsBefore = 0;
        for (let i = 0; i < cursorPos && i < oldValue.length; i++) {
            if (/\d/.test(oldValue[i])) digitsBefore++;
        }
        
        // Extract raw digits and format
        const rawValue = event.target.value.replace(/\D/g, '');
        const formatted = formatNumber(parseInt(rawValue || 0, 10), 0);
        event.target.value = formatted;
        
        // Restore cursor position intelligently
        let newCursorPos = 0;
        let digitsFound = 0;
        for (let i = 0; i < formatted.length; i++) {
            if (/\d/.test(formatted[i])) {
                digitsFound++;
                if (digitsFound === digitsBefore) {
                    newCursorPos = i + 1;
                    break;
                }
            }
        }
        if (newCursorPos === 0) newCursorPos = formatted.length;
        event.target.setSelectionRange(newCursorPos, newCursorPos);
        
        // Trigger calculate with the raw numeric value for calculations
        calculate();
    });
    
    document.querySelectorAll('#rate, #years, #taxRate').forEach(input => {
        input.addEventListener('input', calculate);
    });
    
    // Enforce maximum years limit
    document.getElementById('years').addEventListener('change', event => {
        let value = parseInt(event.target.value, 10);
        if (value > 100) {
            event.target.value = 100;
            calculate();
        }
    });
    
    document.getElementById('toggleAll').addEventListener('click', toggleAllYears);
    calculate();
});

</script>

</body>
</html>
