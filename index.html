<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mortgage Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #f4f8f7;
    --surface: #ffffff;
    --primary: #0f766e;
    --primary-dark: #115e59;
    --primary-light: #ccfbf1;
    --text: #0f172a;
    --muted: #64748b;
    --border: #dbe4e6;
    --equity: #2563eb;
    --tax: #059669;
    --net: #d97706;
    --extra: #6366f1;
    --saved: #16a34a;
    --row-hover: rgba(15, 118, 110, .06);
}

body {
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 100%;
    margin: 0;
    padding: 0 24px;
    box-sizing: border-box;
}

.dashboard {
    display: grid;
    grid-template-columns: 310px minmax(0, 1fr);
    gap: 20px;
    margin-top: 130px; 
    padding-bottom: 24px;
}

.sidebar-wrapper {
    align-self: start;
    width: 310px;
}

.sidebar {
    position: relative; 
    top: 0px; 
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 50;
    max-height: calc(100vh - 140px); 
    overflow-y: auto;
    padding-right: 4px;
    transition: margin-top 0.04s cubic-bezier(0.1, 0.8, 0.2, 1);
}

.sidebar::-webkit-scrollbar {
    width: 6px;
}
.sidebar::-webkit-scrollbar-thumb {
    background-color: #cbd5e1;
    border-radius: 3px;
}

.summary-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 16px; 
    box-shadow: 0 6px 16px rgba(15, 23, 42, .04);
    box-sizing: border-box;
}

.summary-card span {
    display: block;
    font-size: 10px; 
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
    letter-spacing: 0.05em;
}

.summary-card strong {
    display: block;
    font-size: 18px; 
    font-weight: 800;
    color: var(--text);
}

.chart-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 6px 16px rgba(15, 23, 42, .04);
    box-sizing: border-box;
    width: 100%;
    height: 240px; 
    flex-shrink: 0;
}

.card {
    background: #ffffff;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 24px;
    box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    padding: 24px;
    box-sizing: border-box;
}

.table-wrapper {
    width: 100%;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
}

thead tr th {
    position: relative;
    z-index: 90;
    background-color: #ffffff !important;
    padding: 16px 16px;
    border-bottom: 2px solid #cbd5e1 !important;
    box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.05);
    will-change: transform;
    transition: transform 0.04s cubic-bezier(0.1, 0.8, 0.2, 1);
}

th, td {
    padding: 14px 16px;
    text-align: right;
    border-bottom: 1px solid #e2e8f0;
    white-space: nowrap;
}

th {
    color: #334155;
    font-weight: 700;
    letter-spacing: 0.02em;
}

tbody tr.month-row:nth-child(even) { background: #fafcfc; }
tbody tr.month-row:nth-child(odd) { background: #ffffff; }

tbody tr:hover { background: var(--row-hover) !important; }
tbody tr:hover td { color: var(--primary-dark) !important; font-weight: 500; }

.year-row {
    background: linear-gradient(90deg, rgba(15, 118, 110, .10), rgba(15, 118, 110, .02)) !important;
    cursor: pointer;
    font-weight: bold;
}

.year-row td {
    border-bottom: 1px solid #cbd5e1;
    color: var(--text);
}

.year-row td:first-child {
    border-left: 4px solid var(--primary);
    text-align: left;
}

.toggle-icon {
    display: inline-block;
    width: 18px;
    text-align: center;
    margin-right: 6px;
    color: var(--primary);
}

.downpayment-row {
    background-color: rgba(99, 102, 241, 0.04) !important;
}

.downpayment-row input {
    width: 140px;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 13px;
    font-weight: 600;
    color: var(--extra);
    background: #ffffff;
}

.tax { color: var(--tax); font-weight: 600; }
.net { color: var(--net); font-weight: 600; }
.equity { color: var(--equity); font-weight: 600; }
.saved { color: var(--saved); font-weight: 600; }
.extra { color: var(--extra); font-weight: 600; }

button {
    padding: 12px 18px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: var(--primary);
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 160ms ease, background 160ms ease;
}

button:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

select {
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 13px;
    background: white;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
}

.confirm-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fef2f2;
    border: 1px solid #fee2e2;
    padding: 6px 12px;
    border-radius: 14px;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    white-space: nowrap;
    transition: max-width 240ms cubic-bezier(0.4, 0, 0.2, 1), opacity 200ms ease;
}

.confirm-banner.show {
    max-width: 400px;
    opacity: 1;
}

@media (max-width: 1100px) {
    .dashboard { grid-template-columns: 1fr; margin-top: 180px; }
    .sidebar-wrapper { width: 100%; }
    .sidebar { position: relative; top: auto !important; margin-top: 0px !important; max-height: none; overflow-y: visible; }
    .summary-card { min-width: 100%; }
}

@media (max-width: 760px) {
    th, td { padding: 10px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="container">
    <div id="topConfigMenu" style="display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px; position:fixed; top:0; left:0; right:0; background:#ffffff; padding:12px 28px; border-bottom:1px solid rgba(15, 23, 42, 0.08); box-shadow:0 4px 12px rgba(15, 23, 42, 0.06); z-index:100; box-sizing:border-box;">
        <div style="display:flex; flex-direction:column; justify-content:center; flex-shrink:0;">
            <p style="margin:0;font-size:12px;font-weight:700;color:#475569;letter-spacing:0.08em;text-transform:uppercase;">Loan analysis</p>
            <h2 style="margin:4px 0 0;font-size:24px;color:#0f172a;line-height:1.05;">Mortgage Calculator</h2>
        </div>
        
        <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; align-items:flex-end; min-width:0; margin:0 auto; flex:1; max-width:850px;">
            <div style="flex:1 1 120px; min-width:90px;">
                <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Loan (€)</label>
                <input type="text" inputmode="numeric" id="loan" value="600.000" style="width:100%; box-sizing:border-box; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; font-size:13px;">
            </div>
            <div style="flex:1 1 90px; min-width:80px;">
                <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Interest (%)</label>
                <input type="number" id="rate" value="4.17" step="0.01" style="width:100%; box-sizing:border-box; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; font-size:13px;">
            </div>
            <div style="flex:1 1 80px; min-width:70px;">
                <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Years</label>
                <input type="number" id="years" value="30" max="100" style="width:100%; box-sizing:border-box; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; font-size:13px;">
            </div>
            <div style="flex:1 1 110px; min-width:90px;">
                <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Tax return (%)</label>
                <input type="number" id="taxRate" value="36.97" step="0.01" style="width:100%; box-sizing:border-box; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; font-size:13px;">
            </div>
            <div style="flex:1 2 210px; min-width:180px;">
                <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#475569; margin-bottom:6px;">Repayment Strategy</label>
                <select id="repayStrategy">
                    <option value="shorten">Shorten Duration (Same Payment)</option>
                    <option value="lower">Reduce Burden (Lower Payment)</option>
                </select>
            </div>
        </div>
        
        <div style="display:flex; justify-content:flex-end; align-items:center; flex-shrink:0; gap:8px;">
            <div id="confirmResetBanner" class="confirm-banner">
                <span style="font-size:12px; font-weight:600; color:#991b1b;">Reset all?</span>
                <button id="executeReset" type="button" style="height:32px; padding: 0 10px; font-size:11px; border-radius:8px; background:#dc2626;">Yes</button>
                <button id="cancelReset" type="button" style="height:32px; padding: 0 10px; font-size:11px; border-radius:8px; background:#e2e8f0; color:#334155;">No</button>
            </div>

            <button id="clearStorage" type="button" style="height:38px; padding: 0 12px; background:#ef4444;" title="Reset back to default values">Reset</button>
            <button id="toggleAll" type="button" style="height:38px; padding: 0 16px;">Expand All</button>
        </div>
    </div>

    <div class="dashboard" id="mainDashboardLayout">
        <div class="sidebar-wrapper" id="sidebarWrapper">
            <div class="sidebar" id="stickySidebar">
                <div class="summary-card" style="border-left: 4px solid var(--text);">
                    <span>Total Payment (Gross)</span>
                    <strong id="cardTotalPayment">€0</strong>
                </div>
                <div class="summary-card" id="cardExtraWrapper" style="border-left: 4px solid var(--extra); display: none;">
                    <span>Total Extra Repayments</span>
                    <strong id="cardTotalExtra" class="extra">€0</strong>
                </div>
                <div class="summary-card" style="border-left: 4px solid #ef4444;">
                    <span>Total Interest Cost</span>
                    <strong id="cardTotalInterest">€0</strong>
                </div>
                <div class="summary-card" id="cardSavedWrapper" style="border-left: 4px solid var(--saved); display: none;">
                    <span>Interest Saved</span>
                    <strong id="cardTotalSaved" class="saved">€0</strong>
                </div>
                <div class="summary-card" style="border-left: 4px solid var(--tax);">
                    <span>Est. Tax Return (HRA)</span>
                    <strong id="cardTotalTax" class="tax">€0</strong>
                </div>
                <div class="summary-card" style="border-left: 4px solid var(--net);">
                    <span>Total Net Payments</span>
                    <strong id="cardTotalNet" class="net">€0</strong>
                </div>

                <div class="chart-card">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card" id="mainCard">
            <div class="table-wrapper">
                <table id="mortgageTable">
                    <thead>
                        <tr>
                            <th style="text-align:left;">Period</th>
                            <th>Payment</th>
                            <th>Interest</th>
                            <th>Principal</th>
                            <th>Tax Return</th>
                            <th>Net</th>
                            <th>Equity</th>
                            <th>Remaining</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let allYearsExpanded = false;
let yearOpenStates = {};
let annualDownPayments = {};
let mortgageChart = null;

const STORAGE_KEY = 'mortgage_calculator_state';

function adjustMenuLayoutHeights() {
    const topMenu = document.getElementById('topConfigMenu');
    const dashboard = document.getElementById('mainDashboardLayout');
    if (!topMenu || !dashboard) return;
    
    const menuHeight = topMenu.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--menu-height', menuHeight + 'px');
    
    if (window.innerWidth > 1100) {
        dashboard.style.marginTop = (menuHeight + 24) + 'px';
    } else {
        dashboard.style.marginTop = '180px';
    }
    syncTableHeadersSticky();
}

function syncTableHeadersSticky() {
    const table = document.getElementById('mortgageTable');
    const topMenu = document.getElementById('topConfigMenu');
    if (!table || !topMenu) return;

    const ths = table.querySelectorAll('thead th');
    if (window.innerWidth <= 1100) {
        ths.forEach(th => th.style.transform = 'translateY(0px)');
        return;
    }

    const menuHeight = topMenu.getBoundingClientRect().height;
    const tableRect = table.getBoundingClientRect();
    const currentScrollY = window.scrollY || document.documentElement.scrollTop;
    
    const tableTopAbsolute = currentScrollY + tableRect.top;
    const tableBottomAbsolute = tableTopAbsolute + tableRect.height;
    const activationThreshold = tableTopAbsolute - menuHeight;
    
    let targetTranslation = 0;
    
    if (currentScrollY > activationThreshold) {
        targetTranslation = currentScrollY - activationThreshold;
        
        const headerHeight = ths[0] ? ths[0].getBoundingClientRect().height : 45;
        const limitY = tableRect.height - headerHeight;
        if (targetTranslation > limitY) {
            targetTranslation = limitY;
        }
    }
    
    ths.forEach(th => {
        th.style.transform = `translateY(${targetTranslation}px)`;
    });
}

function saveStateToLocalStorage() {
    const state = {
        loan: document.getElementById("loan").value,
        rate: document.getElementById("rate").value,
        years: document.getElementById("years").value,
        taxRate: document.getElementById("taxRate").value,
        repayStrategy: document.getElementById("repayStrategy").value,
        annualDownPayments: annualDownPayments
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadStateFromLocalStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    try {
        const state = JSON.parse(saved);
        if (state.loan) document.getElementById("loan").value = state.loan;
        if (state.rate) document.getElementById("rate").value = state.rate;
        if (state.years) document.getElementById("years").value = state.years;
        if (state.taxRate) document.getElementById("taxRate").value = state.taxRate;
        if (state.repayStrategy) document.getElementById("repayStrategy").value = state.repayStrategy;
        if (state.annualDownPayments) annualDownPayments = state.annualDownPayments;
        return true;
    } catch (e) {
        console.error("Error decoding storage initialization state", e);
        return false;
    }
}

function initStickySidebar() {
    const sidebar = document.getElementById('stickySidebar');
    const wrapper = document.getElementById('sidebarWrapper');
    const mainCard = document.getElementById('mainCard');
    const topMenu = document.getElementById('topConfigMenu');
    
    function handleScroll() {
        syncTableHeadersSticky();

        if (window.innerWidth <= 1100) {
            sidebar.style.marginTop = "0px";
            return;
        }
        const wrapperRect = wrapper.getBoundingClientRect();
        const mainCardRect = mainCard.getBoundingClientRect();
        const menuHeight = topMenu ? topMenu.getBoundingClientRect().height : 84;
        const topSpacing = menuHeight + 20;
        const totalTrackHeight = mainCardRect.height;
        const elementHeight = sidebar.getBoundingClientRect().height;
        const currentScrollOffset = window.scrollY || document.documentElement.scrollTop;
        const dashboardTopY = currentScrollOffset + wrapperRect.top;
        const activationPoint = dashboardTopY - topSpacing;
        
        if (currentScrollOffset > activationPoint) {
            let targetMargin = currentScrollOffset - activationPoint;
            const maxMargin = totalTrackHeight - elementHeight;
            if (targetMargin > maxMargin) targetMargin = maxMargin;
            sidebar.style.marginTop = targetMargin + "px";
        } else {
            sidebar.style.marginTop = "0px";
        }
    }
    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('resize', handleScroll);
    const observer = new MutationObserver(handleScroll);
    observer.observe(document.getElementById('tbody'), { childList: true, subtree: true });
}

function formatNumber(num, decimals = 2) {
    const fixed = num.toFixed(decimals);
    const parts = fixed.split('.');
    const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    const decPart = parts[1] || '';
    if (!decPart || decPart === '0'.repeat(decimals)) return intPart;
    return intPart + ',' + decPart;
}

function getBaselineTotalInterest(loan, rate, totalMonths) {
    if (rate === 0) return 0;
    let basePayment = loan * rate / (1 - Math.pow(1 + rate, -totalMonths));
    let baseBalance = loan;
    let baseTotalInterest = 0;
    
    for (let i = 0; i < totalMonths; i++) {
        if (baseBalance <= 0) break;
        let interest = baseBalance * rate;
        let principal = basePayment - interest;
        if (principal > baseBalance) principal = baseBalance;
        baseTotalInterest += interest;
        baseBalance -= principal;
    }
    return baseTotalInterest;
}

function updateChart(chartLabels, chartBalanceData, chartEquityData) {
    const ctx = document.getElementById('balanceChart').getContext('2d');
    if (mortgageChart) {
        mortgageChart.data.labels = chartLabels;
        mortgageChart.data.datasets[0].data = chartBalanceData;
        mortgageChart.data.datasets[1].data = chartEquityData;
        mortgageChart.update();
    } else {
        mortgageChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [
                    {
                        label: 'Balance',
                        data: chartBalanceData,
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.05)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.2
                    },
                    {
                        label: 'Equity',
                        data: chartEquityData,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.05)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 12, font: { size: 10 } } },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: { label: context => context.dataset.label + ': € ' + formatNumber(context.raw, 0) }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { maxTicksLimit: 6, font: { size: 9 } } },
                    y: { 
                        grid: { color: '#e2e8f0' }, 
                        ticks: { 
                            font: { size: 9 }, 
                            callback: value => '€ ' + value.toLocaleString('nl-NL')
                        } 
                    }
                }
            }
        });
    }
}

function calculate() {
    const activeElement = document.activeElement;
    const focusedYear = activeElement instanceof HTMLInputElement && activeElement.classList.contains('downpayment-input') ? activeElement.dataset.year : null;
    const focusedValue = activeElement instanceof HTMLInputElement && activeElement.classList.contains('downpayment-input') ? activeElement.value : null;
    const selectionStart = activeElement instanceof HTMLInputElement ? activeElement.selectionStart : null;
    const selectionEnd = activeElement instanceof HTMLInputElement ? activeElement.selectionEnd : null;

    let loan = +(document.getElementById("loan").value.replace(/\D/g, ''));
    let rate = (parseFloat(document.getElementById("rate").value) || 0) / 100 / 12;
    let years = Math.min(100, parseInt(document.getElementById("years").value, 10) || 0);
    let taxRate = (parseFloat(document.getElementById("taxRate").value) || 0) / 100;
    let strategy = document.getElementById("repayStrategy").value;

    if (!loan || years <= 0) {
        document.getElementById("tbody").innerHTML = "";
        updateTotals(0,0,0,0,0,0);
        updateChart([], [], []);
        return;
    }

    let totalMonths = years * 12;
    let currentPayment = rate === 0 ? loan / totalMonths : loan * rate / (1 - Math.pow(1 + rate, -totalMonths));

    let balance = loan;
    let totalPayment = 0;
    let totalInterest = 0;
    let totalTax = 0;
    let totalNet = 0;
    let accumulatedExtraRepayments = 0;

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let chartLabels = ['Start'];
    let chartBalanceData = [loan];
    /* FIXED: Explicitly set Equity point zero here to correct axis offsets across updates */
    let chartEquityData = [0];

    for (let y = 1; y <= years; y++) {
        let yearInterest = 0, yearPrincipal = 0, yearTax = 0, yearNet = 0, yearPayment = 0;
        let yearId = "y" + y;
        let isOpen = allYearsExpanded || yearOpenStates[yearId] === true;

        if (balance <= 0) break;

        let header = document.createElement("tr");
        header.className = "year-row";
        header.dataset.open = isOpen ? "1" : "0";
        header.dataset.year = yearId;
        header.innerHTML = `
            <td><span class="toggle-icon">${isOpen ? '▾' : '▸'}</span>Year ${y}</td>
            <td id="pay${y}">0</td>
            <td id="i${y}">0</td>
            <td id="p${y}">0</td>
            <td id="t${y}" class="tax">0</td>
            <td id="n${y}" class="net">0</td>
            <td id="e${y}" class="equity">0</td>
            <td id="b${y}">0</td>
        `;
        tbody.appendChild(header);

        for (let m = 1; m <= 12; m++) {
            if (balance <= 0) break;

            let interest = balance * rate;
            let principal = currentPayment - interest;
            let paymentAmount = currentPayment;

            if (principal > balance) {
                principal = balance;
                paymentAmount = interest + principal;
            }
            balance -= principal;

            let tax = (y <= 30) ? (interest * taxRate) : 0;
            let net = paymentAmount - tax;

            yearInterest += interest;
            yearPrincipal += principal;
            yearTax += tax;
            yearNet += net;
            yearPayment += paymentAmount;

            totalPayment += paymentAmount;
            totalInterest += interest;
            totalTax += tax;
            totalNet += net;

            let row = document.createElement("tr");
            row.className = "month-row " + yearId;
            row.style.display = isOpen ? "table-row" : "none";
            row.innerHTML = `
                <td style="text-align:left;">Month ${(y - 1) * 12 + m}</td>
                <td>${formatNumber(paymentAmount, 2)}</td>
                <td>${formatNumber(interest, 2)}</td>
                <td>${formatNumber(principal, 2)}</td>
                <td class="tax">${formatNumber(tax, 2)}</td>
                <td class="net">${formatNumber(net, 2)}</td>
                <td class="equity">${formatNumber(loan - balance, 2)}</td>
                <td>${formatNumber(balance, 2)}</td>
            `;
            tbody.appendChild(row);
        }

        let extraPayment = Math.max(0, annualDownPayments[yearId] || 0);
        if (extraPayment > 0) {
            extraPayment = Math.min(extraPayment, balance);
            balance -= extraPayment;
            yearPayment += extraPayment;
            yearPrincipal += extraPayment;
            totalPayment += extraPayment;
            accumulatedExtraRepayments += extraPayment;

            if (strategy === "lower") {
                let remainingMonths = totalMonths - (y * 12);
                if (remainingMonths > 0 && balance > 0) {
                    currentPayment = rate === 0 ? balance / remainingMonths : balance * rate / (1 - Math.pow(1 + rate, -remainingMonths));
                }
            }
        }

        chartLabels.push('Y' + y);
        chartBalanceData.push(Math.max(0, balance));
        chartEquityData.push(loan - Math.max(0, balance));

        let extraRow = document.createElement("tr");
        extraRow.className = "month-row downpayment-row " + yearId;
        extraRow.style.display = isOpen ? "table-row" : "none";
        extraRow.innerHTML = `
            <td colspan="2" style="text-align:left; color:#64748b; font-weight: 500;">Extra Repayment EOY ${y}:</td>
            <td colspan="2"><input type="text" inputmode="numeric" pattern="[0-9]*" data-year="${yearId}" class="downpayment-input" value="${extraPayment > 0 ? formatNumber(Math.round(extraPayment), 0) : ''}" style="text-align:right;"></td>
            <td colspan="4" style="text-align:left; padding-left:8px; color:#6b7280; font-weight: 600;">€</td>
        `;
        tbody.appendChild(extraRow);

        const extraInput = extraRow.querySelector('input');
        let pendingCalculateFrame = null;
        
        extraInput.addEventListener('focus', event => { 
            if (event.target.value === '0') event.target.value = ''; 
            event.target.select();
        });
        extraInput.addEventListener('blur', event => { if (event.target.value === '') { annualDownPayments[yearId] = 0; saveStateToLocalStorage(); } });
        extraInput.addEventListener('input', event => {
            const cursorPos = event.target.selectionStart;
            const oldValue = event.target.value;
            let digitsBefore = 0;
            for (let i = 0; i < cursorPos && i < oldValue.length; i++) {
                if (/\d/.test(oldValue[i])) digitsBefore++;
            }
            const rawValue = event.target.value.replace(/\D/g, '');
            const formatted = formatNumber(parseInt(rawValue || 0, 10), 0);
            event.target.value = formatted;
            
            let newCursorPos = 0, digitsFound = 0;
            for (let i = 0; i < formatted.length; i++) {
                if (/\d/.test(formatted[i])) {
                    digitsFound++;
                    if (digitsFound === digitsBefore) { newCursorPos = i + 1; break; }
                }
            }
            if (newCursorPos === 0) newCursorPos = formatted.length;
            event.target.setSelectionRange(newCursorPos, newCursorPos);
            
            annualDownPayments[yearId] = rawValue ? parseInt(rawValue, 10) : 0;
            saveStateToLocalStorage();

            if (pendingCalculateFrame !== null) cancelAnimationFrame(pendingCalculateFrame);
            pendingCalculateFrame = requestAnimationFrame(() => {
                pendingCalculateFrame = null;
                calculate();
            });
        });

        if (focusedYear === yearId && focusedValue !== null) {
            const rawVal = focusedValue.replace(/\D/g, '');
            extraInput.value = formatNumber(parseInt(rawVal, 10), 0);
            window.requestAnimationFrame(() => {
                extraInput.focus();
                if (selectionStart !== null && selectionEnd !== null) {
                    extraInput.setSelectionRange(selectionStart, selectionEnd);
                }
            });
        }

        document.getElementById("pay" + y).innerText = formatNumber(yearPayment, 0);
        document.getElementById("i" + y).innerText = formatNumber(yearInterest, 0);
        document.getElementById("p" + y).innerText = formatNumber(yearPrincipal, 0);
        document.getElementById("t" + y).innerText = formatNumber(yearTax, 0);
        document.getElementById("n" + y).innerText = formatNumber(yearNet, 0);
        document.getElementById("e" + y).innerText = formatNumber(loan - Math.max(0, balance), 0);
        document.getElementById("b" + y).innerText = formatNumber(Math.max(0, balance), 0);

        header.onclick = () => {
            let open = header.dataset.open === "1";
            setYearOpen(header, !open);
        };
    }

    let baseTotalInterest = getBaselineTotalInterest(loan, rate, totalMonths);
    let interestSaved = Math.max(0, baseTotalInterest - totalInterest);

    updateTotals(totalPayment, totalInterest, interestSaved, accumulatedExtraRepayments, totalTax, totalNet);
    updateChart(chartLabels, chartBalanceData, chartEquityData);
    
    bindAutoSelectInputs();
    setTimeout(syncTableHeadersSticky, 10);
}

function bindAutoSelectInputs() {
    document.querySelectorAll('input[type="text"], input[type="number"]').forEach(input => {
        if (!input.dataset.hasAutoSelect) {
            input.dataset.hasAutoSelect = "true";
            input.addEventListener('focus', (e) => e.target.select());
        }
    });
}

function updateTotals(payment, interest, saved, extraRepayments, tax, net) {
    document.getElementById('cardTotalPayment').innerText = '€ ' + formatNumber(payment, 0);
    document.getElementById('cardTotalInterest').innerText = '€ ' + formatNumber(interest, 0);
    document.getElementById('cardTotalTax').innerText = '€ ' + formatNumber(tax, 0);
    document.getElementById('cardTotalNet').innerText = '€ ' + formatNumber(net, 0);
    
    const extraWrapper = document.getElementById('cardExtraWrapper');
    const savedWrapper = document.getElementById('cardSavedWrapper');
    
    if (extraRepayments > 0.5) {
        extraWrapper.style.display = 'block';
        document.getElementById('cardTotalExtra').innerText = '€ ' + formatNumber(extraRepayments, 0);
    } else {
        extraWrapper.style.display = 'none';
    }

    if (saved > 0.5) {
        savedWrapper.style.display = 'block';
        document.getElementById('cardTotalSaved').innerText = '€ ' + formatNumber(saved, 0);
    } else {
        savedWrapper.style.display = 'none';
    }
}

function setYearOpen(header, open) {
    header.dataset.open = open ? "1" : "0";
    const icon = header.querySelector(".toggle-icon");
    if (icon) icon.textContent = open ? '▾' : '▸';
    const yearId = header.dataset.year;
    yearOpenStates[yearId] = open;
    if (!open) {
        allYearsExpanded = false;
        document.getElementById('toggleAll').textContent = 'Expand All';
    }
    document.querySelectorAll("tr.month-row." + yearId).forEach(r => {
        r.style.display = open ? "table-row" : "none";
    });
    syncTableHeadersSticky();
}

function toggleAllYears() {
    allYearsExpanded = !allYearsExpanded;
    document.querySelectorAll('.year-row').forEach(header => setYearOpen(header, allYearsExpanded));
    document.querySelectorAll('.year-row').forEach(header => yearOpenStates[header.dataset.year] = allYearsExpanded);
    document.getElementById('toggleAll').textContent = allYearsExpanded ? 'Collapse All' : 'Expand All';
    syncTableHeadersSticky();
}

window.addEventListener('DOMContentLoaded', () => {
    loadStateFromLocalStorage();
    window.addEventListener('resize', adjustMenuLayoutHeights);
    window.addEventListener('orientationchange', adjustMenuLayoutHeights);
    adjustMenuLayoutHeights();

    const loanInput = document.getElementById('loan');
    loanInput.addEventListener('input', event => {
        const cursorPos = event.target.selectionStart;
        const oldValue = event.target.value;
        let digitsBefore = 0;
        for (let i = 0; i < cursorPos && i < oldValue.length; i++) {
            if (/\d/.test(oldValue[i])) digitsBefore++;
        }
        const rawValue = event.target.value.replace(/\D/g, '');
        const formatted = formatNumber(parseInt(rawValue || 0, 10), 0);
        event.target.value = formatted;
        
        let newCursorPos = 0, digitsFound = 0;
        for (let i = 0; i < formatted.length; i++) {
            if (/\d/.test(formatted[i])) {
                digitsFound++;
                if (digitsFound === digitsBefore) { newCursorPos = i + 1; break; }
            }
        }
        if (newCursorPos === 0) newCursorPos = formatted.length;
        event.target.setSelectionRange(newCursorPos, newCursorPos);
        
        saveStateToLocalStorage();
        calculate();
        adjustMenuLayoutHeights();
    });
    
    document.querySelectorAll('#rate, #years, #taxRate, #repayStrategy').forEach(input => {
        input.addEventListener('change', () => { saveStateToLocalStorage(); calculate(); adjustMenuLayoutHeights(); });
        input.addEventListener('input', () => { saveStateToLocalStorage(); calculate(); adjustMenuLayoutHeights(); });
    });
    
    document.getElementById('years').addEventListener('change', event => {
        let value = parseInt(event.target.value, 10);
        if (value > 100) { event.target.value = 100; }
        saveStateToLocalStorage();
        calculate();
        adjustMenuLayoutHeights();
    });
    
    document.getElementById('toggleAll').addEventListener('click', toggleAllYears);

    const confirmBanner = document.getElementById('confirmResetBanner');
    
    document.getElementById('clearStorage').addEventListener('click', (e) => {
        e.stopPropagation();
        confirmBanner.classList.add('show');
        adjustMenuLayoutHeights();
    });

    document.getElementById('cancelReset').addEventListener('click', (e) => {
        e.stopPropagation();
        confirmBanner.classList.remove('show');
        adjustMenuLayoutHeights();
    });

    document.getElementById('executeReset').addEventListener('click', () => {
        confirmBanner.classList.remove('show');
        localStorage.removeItem(STORAGE_KEY);
        annualDownPayments = {};
        document.getElementById("loan").value = "600.000";
        document.getElementById("rate").value = "4.17";
        document.getElementById("years").value = "30";
        document.getElementById("taxRate").value = "36.97";
        document.getElementById("repayStrategy").value = "shorten";
        calculate();
        adjustMenuLayoutHeights();
    });

    document.addEventListener('click', (e) => {
        if (!confirmBanner.contains(e.target) && e.target.id !== 'clearStorage') {
            if(confirmBanner.classList.contains('show')) {
                confirmBanner.classList.remove('show');
                adjustMenuLayoutHeights();
            }
        }
    });

    calculate();
    initStickySidebar();
    setTimeout(adjustMenuLayoutHeights, 50);
});
</script>
</body>
</html>
